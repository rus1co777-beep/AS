<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AE — Assassin Energy HQ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
<style>
:root{--bg:#050508;--bg2:#0a0a14;--accent:#00ccff;--text:#e0f7ff;--border:rgba(0,204,255,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding-bottom:80px}
#auth-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);padding:25px;border-radius:15px;text-align:center;width:100%;max-width:320px}
.header{position:sticky;top:0;z-index:1000;background:rgba(5,5,8,0.9);backdrop-filter:blur(10px);padding:12px;border-bottom:1px solid var(--border)}
#map{height:450px;width:100%;border-bottom:1px solid var(--border)}
.btn{background:var(--accent);color:#000;border:none;padding:15px;border-radius:10px;font-weight:bold;width:100%;margin-top:10px;text-transform:uppercase;cursor:pointer}
.nav{position:fixed;bottom:0;width:100%;background:var(--bg2);display:flex;padding:15px;border-top:1px solid var(--border);z-index:1000}
input{width:100%;padding:12px;margin-bottom:10px;background:#000;border:1px solid var(--border);color:#fff;border-radius:8px;outline:none}
.leaflet-routing-container{background:var(--bg2)!important;color:#fff!important;font-size:10px!important;max-width:200px!important}
.leaflet-control-geocoder{background:var(--bg2)!important;color:#fff!important;border:1px solid var(--accent)!important}
.leaflet-control-geocoder-icon{filter:invert(1)}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="card">
    <h2 id="auth-title" style="margin-bottom:20px;letter-spacing:2px">ВХОД В СИСТЕМУ</h2>
    <input id="l" placeholder="ЛОГИН">
    <input id="p" type="password" placeholder="ПАРОЛЬ">
    <button class="btn" id="auth-btn" onclick="auth()">ПОДКЛЮЧИТЬСЯ</button>
    <p id="auth-toggle" onclick="toggleMode()" style="font-size:10px;color:var(--accent);margin-top:15px;cursor:pointer">НОВЫЙ АГЕНТ? РЕГИСТРАЦИЯ</p>
  </div>
</div>

<div class="header">
<div style="display:flex;justify-content:space-between"><b>AE <span style="color:var(--accent)">HQ</span></b><span id="bat">--% ⚡</span></div>
<div style="font-size:10px;margin-top:5px;color:var(--accent)" id="lvl">LVL 1 RECRUIT</div>
</div>

<div id="map"></div>

<div style="padding:15px">
<button class="btn" onclick="document.getElementById('f').click()">📸 ЗАСЕЧЬ УЗЕЛ (+100 XP)</button>
<input type="file" id="f" accept="image/*" capture="environment" hidden onchange="up(this)">
<div id="list" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:15px"></div>
</div>

<div class="nav"><div style="flex:1;text-align:center;color:var(--accent);font-weight:bold;font-size:12px">АКТИВНАЯ СЕТКА</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script>
let isReg = false;
let myPos = null;
let routingControl = null;

function toggleMode() {
  isReg = !isReg;
  document.getElementById('auth-title').innerText = isReg ? "РЕГИСТРАЦИЯ" : "ВХОД В СИСТЕМУ";
  document.getElementById('auth-btn').innerText = isReg ? "СОЗДАТЬ АГЕНТА" : "ПОДКЛЮЧИТЬСЯ";
  document.getElementById('auth-toggle').innerText = isReg ? "УЖЕ ЕСТЬ АККАУНТ? ВХОД" : "НОВЫЙ АГЕНТ? РЕГИСТРАЦИЯ";
}

function auth(){
  let l=document.getElementById('l').value;
  if(l){localStorage.setItem('ae_u',l);location.reload()}
}

let cur=localStorage.getItem('ae_u');
if(cur){document.getElementById('auth-screen').style.display='none';}

const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

const map = L.map('map', {center: [55.75, 37.61], zoom: 13, layers: [dark], zoomControl: false});

L.control.layers({"Сетка": dark, "Спутник": satellite}).addTo(map);
L.Control.geocoder({defaultMarkGeocode: true, placeholder: "Поиск узла..."}).addTo(map);

function goTo(lat, lng) {
  if (!myPos) return alert("Жду сигнал GPS...");
  if (routingControl) map.removeControl(routingControl);
  routingControl = L.Routing.control({
    waypoints: [L.latLng(myPos.lat, myPos.lng), L.latLng(lat, lng)],
    lineOptions: {styles: [{color: '#00ccff', weight: 5}]},
    createMarker: () => null
  }).addTo(map);
}

map.locate({setView: true, maxZoom: 16, watch: true});
map.on('locationfound', e => {
  myPos = e.latlng;
  L.circle(e.latlng, {radius: 10, color: '#00ccff'}).addTo(map);
});

map.on('click', e => {
  L.popup().setLatLng(e.latlng).setContent(`<button onclick="goTo(${e.latlng.lat}, ${e.latlng.lng})" style="background:#00ccff;border:none;padding:5px 10px;border-radius:5px;font-weight:bold">ПРОЛОЖИТЬ ПУТЬ</button>`).openOn(map);
});

let u = JSON.parse(localStorage.getItem('ae_d_'+cur))||{xp:0,nodes:[]};
function up(i){
  const r=new FileReader();
  r.onload=(e)=>{
    u.nodes.push({p:e.target.result});u.xp+=100;
    localStorage.setItem('ae_d_'+cur,JSON.stringify(u));
    update();
  };
  r.readAsDataURL(i.files[0]);
}

function update(){
  let l=Math.floor(Math.sqrt(u.xp/100))+1;
  document.getElementById('lvl').innerText='LVL '+l+' AGENT | XP: '+u.xp;
  document.getElementById('list').innerHTML=u.nodes.map(n=>`<img src="${n.p}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;border:1px solid var(--border)">`).join('');
}
update();

navigator.getBattery().then(b=>{
  const r=()=>document.getElementById('bat').innerText=Math.round(b.level*100)+'% ⚡';
  b.onlevelchange=r; r();
});
</script>
</body>
</html>
