<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE — Assassin Energy HQ (React)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100%; width: 100%; z-index: 1; }
        .leaflet-popup-content-wrapper { background: #111827; color: white; border: 1px solid #06b6d4; }
        .leaflet-popup-tip { background: #06b6d4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Иконка узла
        const socketIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2903/2903541.png',
            iconSize: [36, 36],
            iconAnchor: [18, 36],
        });

        // Основной компонент приложения
        function App() {
            const [user, setUser] = useState(localStorage.getItem('ae_u'));
            const [myPos, setMyPos] = useState(null);
            const [nodes, setNodes] = useState([]);
            const [xp, setXp] = useState(0);
            const [addMode, setAddMode] = useState(false);
            const [pendingCoords, setPendingCoords] = useState(null);
            const [map, setMap] = useState(null);

            // Загрузка данных
            useEffect(() => {
                if (user) {
                    const data = JSON.parse(localStorage.getItem(`ae_d_${user}`)) || { xp: 0, nodes: [] };
                    setNodes(data.nodes);
                    setXp(data.xp);
                }
            }, [user]);

            // Сохранение данных
            useEffect(() => {
                if (user) {
                    localStorage.setItem(`ae_d_${user}`, JSON.stringify({ xp, nodes }));
                }
            }, [nodes, xp, user]);

            // Инициализация карты
            useEffect(() => {
                if (user && !map) {
                    const m = L.map('map', { zoomControl: false }).setView([55.75, 37.61], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(m);
                    
                    m.on('click', (e) => {
                        // Логика клика передается через стейт ниже
                        window.lastClick = [e.latlng.lat, e.latlng.lng];
                    });

                    // GPS слежение
                    m.locate({ setView: true, maxZoom: 16, watch: true });
                    m.on('locationfound', (e) => setMyPos([e.latlng.lat, e.latlng.lng]));
                    
                    setMap(m);
                }
            }, [user]);

            // Отрисовка маркеров
            useEffect(() => {
                if (map) {
                    map.eachLayer((layer) => { if (layer instanceof L.Marker && layer.options.icon !== undefined) map.removeLayer(layer); });
                    nodes.forEach(node => {
                        const marker = L.marker(node.coords, { icon: socketIcon }).addTo(map);
                        marker.bindPopup(`
                            <div class="p-2">
                                <p class="font-bold mb-2">${node.description}</p>
                                <button onclick="window.deleteNode('${node.id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">УДАЛИТЬ</button>
                            </div>
                        `);
                    });
                }
            }, [nodes, map]);

            window.deleteNode = (id) => {
                setNodes(prev => prev.filter(n => n.id !== id));
            };

            const handleMapClick = () => {
                if (window.lastClick) {
                    if (addMode) setPendingCoords(window.lastClick);
                    else {
                        if (myPos) window.open(`https://www.google.com/maps/dir/${myPos[0]},${myPos[1]}/${window.lastClick[0]},${window.lastClick[1]}`, '_blank');
                        else alert("Жду сигнал GPS...");
                    }
                    window.lastClick = null;
                }
            };

            const saveNode = (desc) => {
                const newNode = { id: Date.now().toString(), coords: pendingCoords, description: desc };
                setNodes([...nodes, newNode]);
                setXp(xp + 100);
                setPendingCoords(null);
                setAddMode(false);
            };

            if (!user) return (
                <div className="h-screen bg-black flex items-center justify-center p-6">
                    <div className="w-full max-w-xs bg-gray-900 border border-cyan-500/30 p-6 rounded-2xl text-center">
                        <h2 className="text-cyan-400 font-bold tracking-widest mb-6">AE - ASSASSIN</h2>
                        <input id="loginInput" placeholder="ЛОГИН" className="w-full bg-black border border-cyan-900 p-3 rounded-xl mb-4 text-white outline-none focus:border-cyan-500" />
                        <button onClick={() => {
                            const val = document.getElementById('loginInput').value;
                            if(val) { localStorage.setItem('ae_u', val); setUser(val); }
                        }} className="w-full bg-cyan-500 py-3 rounded-xl font-bold text-black uppercase">Подключиться</button>
                    </div>
                </div>
            );

            const level = Math.floor(Math.sqrt(xp / 100)) + 1;

            return (
                <div className="h-screen flex flex-col bg-black overflow-hidden" onClick={handleMapClick}>
                    {/* Header */}
                    <div className="p-4 bg-black/90 border-b border-cyan-500/20 flex justify-between items-center z-10">
                        <div>
                            <div className="text-cyan-400 font-bold">AE <span className="text-white">HQ</span></div>
                            <div className="text-[10px] text-cyan-600 uppercase tracking-tighter">Agent: {user}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs font-mono">LVL {level} | XP {xp}</div>
                            <button onClick={() => { localStorage.removeItem('ae_u'); location.reload(); }} className="text-[10px] text-gray-500 uppercase">Выйти</button>
                        </div>
                    </div>

                    {/* Map Area */}
                    <div className="flex-1 relative">
                        <div id="map"></div>
                        
                        {/* Кнопка "Найти меня" */}
                        <button onClick={() => map.locate({setView: true})} className="absolute bottom-24 right-4 z-10 bg-gray-900 border border-cyan-500/50 p-3 rounded-full shadow-lg shadow-cyan-500/20">📍</button>
                    </div>

                    {/* Bottom Control */}
                    <div className="p-4 bg-black border-t border-cyan-900/50 z-10">
                        <button 
                            onClick={() => setAddMode(!addMode)}
                            className={`w-full py-4 rounded-2xl font-bold uppercase transition-all ${addMode ? 'bg-red-500 text-white shadow-lg shadow-red-500/20' : 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20'}`}
                        >
                            {addMode ? 'Отмена (нажми на карту)' : 'Добавить узел'}
                        </button>
                    </div>

                    {/* Modal */}
                    {pendingCoords && (
                        <div className="fixed inset-0 z-[2000] bg-black/80 backdrop-blur flex items-center justify-center p-6">
                            <div className="w-full max-w-xs bg-gray-900 border border-cyan-500 p-6 rounded-2xl">
                                <h3 className="text-cyan-400 font-bold mb-4">Описание узла</h3>
                                <input id="descIn" autoFocus className="w-full bg-black border border-cyan-900 p-3 rounded-xl text-white mb-4 outline-none" placeholder="Напр: Электрощит" />
                                <div className="flex gap-2">
                                    <button onClick={() => saveNode(document.getElementById('descIn').value)} className="flex-1 bg-cyan-500 py-2 rounded-xl font-bold text-black">ОК</button>
                                    <button onClick={() => setPendingCoords(null)} className="flex-1 bg-gray-700 py-2 rounded-xl text-white">ОТМЕНА</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
